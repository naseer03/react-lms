name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            APP_DIR="/var/www/lms"

            # Clone repo on first deploy if it doesn't exist
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ secrets.GH_REPO }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Copy production env file if it doesn't exist
            if [ ! -f backend/.env ]; then
              echo "WARNING: backend/.env not found. Create it manually on the VPS."
              exit 1
            fi

            # Build and restart containers (supports both docker compose v2 and docker-compose v1)
            if command -v docker compose &> /dev/null; then
              docker compose pull || true
              docker compose up --build -d --remove-orphans
            else
              docker-compose pull || true
              docker-compose up --build -d --remove-orphans
            fi

            # Clean up unused images
            docker image prune -f

            echo "Deployment complete!"
