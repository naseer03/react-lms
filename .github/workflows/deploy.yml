name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH (attempt 1)
        id: deploy1
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          script: &deploy_script |
            set -e
            APP_DIR="/var/www/lms"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ secrets.GH_REPO }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main
            if [ ! -f backend/.env ]; then
              echo "ERROR: backend/.env not found."
              exit 1
            fi
            docker compose pull || true
            docker compose up --build -d --remove-orphans
            docker image prune -f
            echo "Deployment complete!"

      - name: Wait and retry if failed
        if: steps.deploy1.outcome == 'failure'
        run: sleep 15

      - name: Deploy to VPS via SSH (attempt 2)
        if: steps.deploy1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            APP_DIR="/var/www/lms"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ secrets.GH_REPO }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main
            if [ ! -f backend/.env ]; then
              echo "ERROR: backend/.env not found."
              exit 1
            fi
            docker compose pull || true
            docker compose up --build -d --remove-orphans
            docker image prune -f
            echo "Deployment complete!"
