version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "5500:5000"
    environment:
      HOST_SANDBOX_DIR: /var/www/lms/backend/tmp/sandbox
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./backend/tmp:/app/tmp
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mongo
    networks:
      - lms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms-frontend
    restart: unless-stopped
    ports:
      - "3500:80"
    depends_on:
      - backend
    networks:
      - lms-network

  mongo:
    image: mongo:7
    container_name: lms-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: lms_db
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - lms-network

networks:
  lms-network:
    driver: bridge

volumes:
  mongo-data:
